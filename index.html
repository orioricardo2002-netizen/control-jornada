<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Jornada Laboral</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>CONTROL DE JORNADA LABORAL</h1>

    <div class="datosTrabajador">
        <h2>Ricardo Orío Yangüela</h2>
        <p>DNI: 16635902W</p>
    </div>

    <div class="controles">
        <label for="periodo">
            <strong>Periodo (26 al 25):</strong>
        </label>
        <input type="month" id="periodo">
        <button id="btnGenerar">Generar Periodo</button>
        <button id="btnGuardar">Guardar</button>
        <button id="btnSalir">Salir</button>
    </div>

    <table id="tablaJornada">
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Ent. M</th>
                <th>Sal. M</th>
                <th>Ent. T</th>
                <th>Sal. T</th>
                <th>Total Horas</th>
                <th>Horas Extras</th>
                <th>Dieta €</th>
                <th>Pernocta €</th>
                <th>Observaciones</th>
            </tr>
        </thead>
        <tbody id="tablaBody"></tbody>
    </table>

    <div class="totales">
        <p>Total Días Trabajados: <span id="totalDias">0</span></p>
        <p>Total Horas Trabajadas: <span id="totalHoras">0:00</span></p>
        <p>Total Horas Extras: <span id="totalExtras">0:00</span></p>
        <p>Total Dietas: <span id="totalDietas">0,00</span> €</p>
        <p>Total Pernocas: <span id="totalPernoctas">0</span> €</p>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
