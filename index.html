<div class="authPanel">
        <p id="authStatus">Sin iniciar sesión</p>
        <input type="email" id="authEmail" placeholder="Email" autocomplete="email" aria-label="Email">
        <input type="password" id="authPassword" placeholder="Contraseña" autocomplete="current-password" aria-label="Contraseña">
        <button id="btnRefrescar" type="button">Refrescar</button> 
        <button id="btnLogin" type="button">Entrar</button>
        <button id="btnRegistro" type="button">Crear cuenta</button>
        <button id="btnLogout" type="button">Cerrar sesión</button>
    </div>
